# Nginx Configuration for Kagaj Ko Katha
# Place this at /etc/nginx/sites-available/kagajkokatha
# Then: sudo ln -s /etc/nginx/sites-available/kagajkokatha /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name blogs.kagajkokatha.com www.blogs.kagajkokatha.com;

    # Redirect HTTP to HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    # --- Remove everything below this line after enabling HTTPS ---

    # Frontend (Next.js standalone)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (FastAPI/uvicorn)
    location /api/v2/ {
        # Strip /api/v2 prefix before forwarding to uvicorn
        rewrite ^/api/v2/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Serve uploaded files directly via Nginx (faster than proxying)
    location /uploads/ {
        alias /home/deploy/kagaj3.0/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

