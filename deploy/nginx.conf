# Nginx Configuration for Kagaj Ko Katha (blogs.kagajkokatha.com)
# Place this at /etc/nginx/sites-available/blogs-kagajkokatha
# Then: sudo ln -s /etc/nginx/sites-available/blogs-kagajkokatha /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name blogs.kagajkokatha.com;

    # After certbot, this block will be auto-modified to redirect to HTTPS

    # Frontend (Next.js standalone)
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        # Strip /api prefix before forwarding to uvicorn
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Serve uploaded files directly via Nginx (faster than proxying)
    location /uploads/ {
        alias /home/deployment/kagaj3.0/kagaj3.0/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
